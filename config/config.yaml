# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════

# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/

# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: true

# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: true
  preset: "morning_evening"

# ===============================================================
# 2. 数据源 - 热榜平台（已禁用，仅关注国外新闻）
# ===============================================================
platforms:
  enabled: false                     # 🔴 改为 false，禁用所有国内热榜平台
  sources:
    - id: "toutiao"
      name: "今日头条"
    - id: "baidu"
      name: "百度热搜"
    - id: "wallstreetcn-hot"
      name: "华尔街见闻"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "bilibili-hot-search"
      name: "bilibili 热搜"
    - id: "cls-hot"
      name: "财联社热门"
    - id: "ifeng"
      name: "凤凰网"
    - id: "tieba"
      name: "贴吧"
    - id: "weibo"
      name: "微博"
    - id: "douyin"
      name: "抖音"
    - id: "zhihu"
      name: "知乎"

# ===============================================================
# 3. 数据源 - RSS 订阅（主要国外新闻来源）
# ===============================================================
rss:
  enabled: true                      # 启用 RSS 抓取
  freshness_filter:
    enabled: true
    max_age_days: 1                  # 只推送 1 天内的文章
  feeds:
    # 科技类
    - id: "hacker-news"
      name: "Hacker News"
      url: "https://hnrss.org/frontpage"
    - id: "yahoo-finance"
      name: "雅虎财经"
      url: "https://finance.yahoo.com/news/rssindex"
    # 经济类
    - id: "economist"
      name: "经济学人"
      url: "https://www.economist.com/feeds/print-sections/77/business.xml"
      enabled: true
    - id: "wsj"
      name: "华尔街日报"
      url: "https://feeds.a.dj.com/rss/RSSWorldNews.xml"
      enabled: true
    # 文化/娱乐类
    - id: "variety"
      name: "Variety"
      url: "https://variety.com/feed/"
      enabled: true
    - id: "pitchfork"
      name: "Pitchfork"
      url: "https://pitchfork.com/feed/feed.rss"
      enabled: true
    - id: "bbc-culture"
      name: "BBC Culture"
      url: "https://feeds.bbci.co.uk/news/culture_and_arts/rss.xml"
      enabled: true
    # 科技类补充
    - id: "techcrunch"
      name: "TechCrunch"
      url: "https://techcrunch.com/feed/"
      enabled: true
    - id: "theverge"
      name: "The Verge"
      url: "https://www.theverge.com/rss/index.xml"
      enabled: true

# ===============================================================
# 4. 报告模式
# ===============================================================
report:
  mode: "current"
  display_mode: "keyword"
  sort_by_position_first: false
  rank_threshold: 5
  max_news_per_keyword: 0

# ===============================================================
# 4.5 筛选策略
# ===============================================================
filter:
  method: "ai"                       # 使用 AI 兴趣分类
  priority_sort_enabled: true

# ===============================================================
# 4.6 AI 智能筛选配置
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.7
  reclassify_threshold: 0.6
  prompt_file: "prompt.txt"
  extract_prompt_file: "extract_prompt.txt"
  update_tags_prompt_file: "update_tags_prompt.txt"

# ===============================================================
# 5. 推送内容控制
# ===============================================================
display:
  region_order:
    - new_items
    - hotlist
    - rss
    - standalone
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: true                        # 开启 RSS 区域展示
    standalone: false                # 独立展示区关闭（无需热榜）
    ai_analysis: true
  standalone:
    platforms: []                    # 清空国内平台
    rss_feeds: []
    max_items: 20

# ===============================================================
# 6. 推送通知（保持原样，按需填写 webhooks）
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""

# ===============================================================
# 7. 存储配置（保持原样）
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 0
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7

# ===============================================================
# 8. AI 模型配置（保持原样）
# ===============================================================
ai:
  model: "deepseek/deepseek-chat"
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 1.0
  max_tokens: 5000
  num_retries: 1
  fallback_models: []

# ===============================================================
# 9. AI 分析功能
# ===============================================================
ai_analysis:
  enabled: true
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 150
  include_rss: true                  # 🔴 改为 true，分析 RSS 内容
  include_standalone: false
  include_rank_timeline: true

# ===============================================================
# 10. AI 翻译功能
# ===============================================================
ai_translation:
  enabled: true
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false                   # 热榜已禁用，无需翻译
    rss: true                        # 翻译 RSS 标题
    standalone: false

# ===============================================================
# 11. 高级设置（保持原样）
# ===============================================================
advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
